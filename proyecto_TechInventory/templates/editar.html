<!DOCTYPE html>
<html>
<head>
    <title>Editar Producto</title>
</head>
<body>
    <h1>Editar Producto</h1>

    <a href="{{ url_for('productos') }}">Volver a Productos</a>

    <form method="POST" action="{{ url_for('editar', id=producto[0]) }}">
        <br>
        Nombre:
        <input type="text" name="nombre" value="{{ producto[1] }}" required>
        <br><br>

        Cantidad:
        <input type="number" name="cantidad" value="{{ producto[2] }}" required>
        <br><br>

        Precio:
        <input type="number" step="0.01" name="precio" value="{{ producto[3] }}" required>
        <br><br>

        <button type="submit">Actualizar</button>
    </form>

</body>
</html>
