{% extends "base.html" %}

{% block content %}
<h2>Lista de Productos</h2>

<a href="/agregar" class="btn btn-success mb-3">Agregar Producto</a>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Acciones</th>
    </tr>

    {% for p in productos %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.nombre }}</td>
        <td>{{ p.cantidad }}</td>
        <td>${{ p.precio }}</td>
        <td>
            <a href="/editar/{{ p.id }}" class="btn btn-warning btn-sm">Editar</a>
            <a href="/eliminar/{{ p.id }}" class="btn btn-danger btn-sm">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
